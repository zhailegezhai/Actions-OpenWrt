#============================================================
# 长城宽带 KJ30-N 专用 · 修复 Node.js 20 废弃警告
#============================================================

name: Build OpenWrt KJ30-N

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      ssh:
        description: 'SSH debug'
        required: false
        default: 'false'

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialization Environment
        run: |
          sudo -E apt-get -qq update
          sudo -E apt-get -qq install build-essential clang flex libelf-dev gawk gcc-multilib g++-multilib diffutils git libncurses5-dev libncursesw5-dev python2 python3 unzip bzip2 wget curl rsync
          sudo -E apt-get -qq autoremove --purge
          sudo -E apt-get -qq clean

      - name: Prepare Clash Core
        run: |
          mkdir -p files/etc/openclash/core
          wget -q https://github.com/vernesong/OpenClash/raw/core/dev/dev/clash-linux-arm64.tar.gz -O - | tar -xz -C files/etc/openclash/core
          chmod +x files/etc/openclash/core/clash

      - name: Update Feeds
        run: |
          git clone https://github.com/coolsnowwolf/lede openwrt
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Load Custom Config
        run: |
          [ -f ../.config ] && mv -f ../.config .config
          ls -a

      - name: SSH Debug (Optional)
        if: github.event.inputs.ssh == 'true'
        uses: mxschmitt/action-tmate@v3

      - name: Compile Firmware
        run: |
          cd openwrt
          make defconfig
          make -j$(nproc) download
          make -j$(nproc) V=s

      - name: Upload Firmware
        uses: actions/upload-artifact@v4
        with:
          name: OpenWrt-KJ30N
          path: openwrt/bin/targets/mediatek/filogic/*.bin

      # 新版清理 Releases · 无 Node.js 警告
      - name: Clean Old Releases
        uses: dev-drprasad/delete-tag-and-release@v1.1
        with:
          delete_tags: true
          keep_latest: 3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
